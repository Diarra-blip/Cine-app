<div class="card shadow m-4" style="width: 18rem; min-height: 35rem;">
  @if(movie.image) {
    <img 
      [src]="'http://172.20.10.3:8080/movies/' + movie.id + '/image'" 
      class="card-img-top" 
      [alt]="movie.title"
      style="height: 250px; object-fit: cover;"
    >
  } @else {
    <img src="assets/img/placeholder.png" class="card-img-top" alt="Image non disponible">
  }

  <div class="card-body d-flex flex-column">
    <h5 class="card-title text-primary">{{ movie.title }}</h5>
    
    <p class="card-text flex-grow-1">
      {{ movie.synopsis.length > 150 ? (movie.synopsis | slice:0:150) + '...' : movie.synopsis }}
    </p>

    <div class="mt-auto">
      <hr>
      <div class="d-flex justify-content-between align-items-center">
        <span class="badge bg-warning text-dark">Note: {{ movie.rate }}/5</span>
        <small class="text-muted">{{ movie.releaseDate | date:'yyyy' }}</small>
      </div>
    </div>
  </div>
</div>
