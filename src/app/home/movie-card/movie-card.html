<div class="movie-card">
  <div class="movie-poster">
    <img
      [src]="movie.image && movie.image.startsWith('http') ? movie.image : 'http://localhost:8080/movies/' + movie.id + '/image'"
      [alt]="movie.title"
      (error)="$any($event.target).src='https://placehold.co/200x300/1a1a2e/f5c518?text=' + movie.title"
    />
    <div class="movie-hover">
      <span class="play-btn">▶</span>
    </div>
  </div>
  <div class="movie-info">
    <h5>{{ movie.title }}</h5>
    <p>{{ movie.director }}</p>
    <div class="movie-meta">
      <span class="rate">⭐ {{ movie.rate }}/5</span>
      <span class="year">{{ movie.releaseDate | date:'yyyy' }}</span>
    </div>
  </div>
</div>
