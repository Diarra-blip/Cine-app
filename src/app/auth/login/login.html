<div class="auth-container">
  <h2>Connectez-vous à votre compte</h2>
  <form (ngSubmit)="login()" #loginForm="ngForm">

    <div class="field-wrapper">
      <input
        type="email"
        placeholder="E-mail"
        [(ngModel)]="email"
        name="email"
        required
        email
        #emailField="ngModel"
        [class.invalid]="emailField.invalid && emailField.touched"
      />
      <span class="field-error" *ngIf="emailField.invalid && emailField.touched">
        Email invalide
      </span>
    </div>

    <div class="password-wrapper">
      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Mot de passe"
        [(ngModel)]="password"
        name="password"
        required
        minlength="6"
        #passwordField="ngModel"
        [class.invalid]="passwordField.invalid && passwordField.touched"
      />
      <button type="button" class="eye-btn" (click)="showPassword = !showPassword"
              [title]="showPassword ? 'Masquer' : 'Afficher'">
        {{ showPassword ? '🙈' : '👁️' }}
      </button>
      <span class="field-error" *ngIf="passwordField.invalid && passwordField.touched">
    Minimum 6 caractères
  </span>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>
  </form>
  <p>Nouvel utilisateur? <a routerLink="/register" class="text-blue">Inscrivez-vous</a></p>
</div>
