<div class="auth-container">
  <h2>Connectez-vous à votre compte</h2>
  <form (ngSubmit)="login()" #loginForm="ngForm">
    <input
      type="email"
      placeholder="E-mail"
      [(ngModel)]="email"
      name="email"
      required
    />
    <input
      type="password"
      placeholder="Mot de passe"
      [(ngModel)]="password"
      name="password"
      required
    />
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit">Se connecter</button>
  </form>
  <p>
    Nouvel utilisateur?
    <a href="/register" class="text-blue">Inscrivez-vous</a>
  </p>
</div>
