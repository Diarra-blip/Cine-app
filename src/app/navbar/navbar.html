<nav class="douceur-navbar">
  <div class="navbar-main-line">
    <!-- Logo -->
    <a class="douceur-logo" routerLink="/">🎬 {{ title }}</a>

    <!-- Liens centraux visibles quand connecté -->
    <div class="nav-links" *ngIf="auth.isLoggedIn()">
      <a class="nav-link" routerLink="/">Accueil</a>
      <a class="nav-link" routerLink="/movies">Films</a>
      <a class="nav-link" routerLink="/charts">Statistiques</a>
      <a class="nav-link" routerLink="/add-movie">+ Ajouter</a>
    </div>

    <!-- Hamburger -->
    <div class="nav-hamburger-wrapper" (click)="toggleMenu()">
      <button class="hamburger" [class.open]="expanded">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Dropdown menu -->
  <div class="nav-dropdown" [class.visible]="expanded">
    <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
      <a class="dropdown-item" routerLink="/login" (click)="closeMenu()">
        <span class="item-icon">🔑</span> Connexion
      </a>
      <a class="dropdown-item primary" routerLink="/register" (click)="closeMenu()">
        <span class="item-icon">✨</span> Créer un compte
      </a>
    </ng-container>

    <ng-template #loggedIn>
      <a class="dropdown-item" routerLink="/" (click)="closeMenu()">
        <span class="item-icon">🏠</span> Accueil
      </a>
      <a class="dropdown-item" routerLink="/movies" (click)="closeMenu()">
        <span class="item-icon">🎬</span> Films
      </a>
      <a class="dropdown-item" routerLink="/add-movie" (click)="closeMenu()">
        <span class="item-icon">➕</span> Ajouter un film
      </a>
      <a class="dropdown-item" routerLink="/charts" (click)="closeMenu()">
        <span class="item-icon">📊</span> Statistiques
      </a>
      <a class="dropdown-item" routerLink="/profile" (click)="closeMenu()">
        <span class="item-icon">👤</span> Mon Espace
      </a>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" (click)="logout()">
        <span class="item-icon">🚪</span> Déconnexion
      </button>
    </ng-template>
  </div>
</nav>

<!-- Overlay pour fermer le menu en cliquant dehors -->
<div class="nav-overlay" *ngIf="expanded" (click)="closeMenu()"></div>
