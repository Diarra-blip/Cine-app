<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-warning text-dark text-center py-4">
          <h2 class="h4 mb-0 fw-bold">🎬 Ajouter un Nouveau Film</h2>
        </div>

        <div class="card-body p-4">
          <form #movieForm="ngForm">

            <div class="mb-3">
              <label class="form-label fw-bold">Titre du film (Original)</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted">Aa</span>
                <input type="text" name="title" [(ngModel)]="movie.title" 
                  required minlength="2" #title="ngModel"
                  (blur)="searchMovie()" (change)="searchMovie()"
                  class="form-control" [class.is-invalid]="title.invalid && title.touched" 
                  placeholder="Ex: Inception" />
                <div class="invalid-feedback">
                  Le titre est obligatoire (minimum 2 caractères).
                </div>
              </div>
              <small class="text-muted">La recherche s'active en quittant ce champ.</small>
            </div>

            <div class="text-center mb-3" *ngIf="movie.image">
              <img [src]="movie.image" class="img-thumbnail shadow-sm" style="max-height: 200px;">
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Réalisateur</label>
                <div class="input-group">
                  <span class="input-group-text bg-light text-muted">👤</span>
                  <input type="text" name="director" [(ngModel)]="movie.director" required
                    class="form-control" placeholder="Nom du réalisateur" />
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Date de sortie</label>
                <div class="input-group">
                  <span class="input-group-text bg-light text-muted">📅</span>
                  <input type="date" name="releaseDate" [(ngModel)]="movie.releaseDate"
                    required [max]="maxLimitDate" [min]="minDate"
                    class="form-control" />
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Catégorie</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted">🏷️</span>
                <select name="category" [(ngModel)]="movie.category" required class="form-control">
                  <option value="" disabled selected>-- Choisir un genre --</option>
                  <option value="Action">Action</option>
                  <option value="Comédie">Comédie</option>
                  <option value="Drame">Drame</option>
                  <option value="Horreur">Horreur</option>
                  <option value="Science-Fiction">Science-Fiction</option>
                </select>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Synopsis</label>
              <textarea name="synopsis" [(ngModel)]="movie.synopsis" required minlength="30"
                class="form-control" rows="4" placeholder="Minimum 30 caractères..."></textarea>
            </div>

            <div class="d-grid">
              <button type="button" class="btn btn-warning btn-lg shadow-sm fw-bold py-3"
                (click)="addMovie()" [disabled]="movieForm.invalid">
                ➕ Enregistrer le film
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
