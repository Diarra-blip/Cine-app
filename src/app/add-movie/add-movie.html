<div class="container mt-4">
  <h1>Ajouter un film</h1>

  <div class="d-flex flex-column w-50">
    <label for="title">Titre</label>
    <input type="text" id="title" name="title" [(ngModel)]="movie.title" required #title="ngModel"/>
    <div *ngIf="title.invalid && title.touched" class="text-danger">
      Le titre est obligatoire.
    </div>
  </div>

  <div class="d-flex flex-column w-50 mt-2">
    <label for="director">Réalisateur</label>
    <input type="text" id="director" name="director" [(ngModel)]="movie.director" required #director="ngModel"/>
    <div *ngIf="director.invalid && director.touched" class="text-danger">
      Le nom du réalisateur est obligatoire.
    </div>
  </div>

  <button 
    class="btn btn-warning mt-3" 
    (click)="addMovie()" 
    [disabled]="title.invalid || director.invalid">
    Ajouter
  </button>
</div>
