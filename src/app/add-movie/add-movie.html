<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-warning text-dark text-center py-3">
          <h2 class="h4 mb-0">🎬 Ajouter un Nouveau Film</h2>
        </div>
        
        <div class="card-body p-4">
          <form #movieForm="ngForm">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Titre du film</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted">Aa</span>
                <input type="text" name="title" [(ngModel)]="movie.title" required minlength="2" #title="ngModel"
                  class="form-control" [class.is-invalid]="title.invalid && title.touched" placeholder="Ex: Inception" />
                <div class="invalid-feedback" *ngIf="title.invalid && title.touched">
                  Un titre de 2 caractères minimum est requis.
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Réalisateur</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i>👤</span>
                <input type="text" name="director" [(ngModel)]="movie.director" required #director="ngModel"
                  class="form-control" [class.is-invalid]="director.invalid && director.touched" placeholder="Ex: Christopher Nolan" />
                <div class="invalid-feedback" *ngIf="director.invalid && director.touched">
                  Le nom du réalisateur est obligatoire.
                </div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Synopsis</label>
              <textarea name="synopsis" [(ngModel)]="movie.synopsis" required minlength="10" #synopsis="ngModel"
                class="form-control" rows="4" [class.is-invalid]="synopsis.invalid && synopsis.touched" 
                placeholder="Décrivez brièvement l'histoire..."></textarea>
              <div class="invalid-feedback" *ngIf="synopsis.invalid && synopsis.touched">
                Veuillez saisir au moins 10 caractères.
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="button" class="btn btn-warning btn-lg shadow-sm fw-bold" 
                (click)="addMovie()" [disabled]="movieForm.invalid">
                <i class="bi bi-plus-circle-fill me-2"></i>➕ Enregistrer le film
              </button>
              <small class="text-center text-muted" *ngIf="movieForm.invalid">
                Veuillez remplir tous les champs pour valider.
              </small>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
